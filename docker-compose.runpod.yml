# RunPod / vLLM overlay
#
# Layered on top of docker-compose.yml. Adds vLLM,
# switches nginx to HTTP-only on port 8080, and wires fastify-proxy at the vllm
# service instead of host.docker.internal.
#
# Local test (GPU):
#   docker compose -f docker-compose.yml -f docker-compose.runpod.yml up --build
#
# Local test (CPU only — slow, good enough for proxy/auth testing):
#   VLLM_DEVICE=cpu VLLM_MODEL=facebook/opt-125m \
#   docker compose -f docker-compose.yml -f docker-compose.runpod.yml up --build
#
# RunPod (set env vars via template UI, volume mounted at /workspace):
#   docker compose -f docker-compose.yml -f docker-compose.runpod.yml up --build

services:

  # ── vLLM ──────────────────────────────────────────────────────────────────
  vllm:
    image: vllm/vllm-openai:latest
    container_name: vllm
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
    volumes:
      # Cache models on the RunPod network volume (/workspace) so they survive
      # pod restarts. Locally, falls back to ./vllm-cache.
      - ${VLLM_MODEL_CACHE_DIR:-./vllm-cache}:/root/.cache/huggingface
    command:
      - "--model"
      - "${VLLM_MODEL:-facebook/opt-125m}"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
      - "--device"
      - "${VLLM_DEVICE:-auto}"       # auto = GPU; set to "cpu" for local CPU testing
      - "--dtype"
      - "${VLLM_DTYPE:-auto}"        # auto = bf16 on GPU, float32 on CPU
      - "--max-model-len"
      - "${VLLM_MAX_MODEL_LEN:-4096}"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - vllm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/models"]
      interval: 10s
      timeout: 5s
      retries: 12        # up to 2 min wait for model load
      start_period: 30s

  # ── nginx (HTTP only, no SSL, port 8080) ──────────────────────────────────
  nginx:
    ports:
      - "${NGINX_PORT:-8080}:8080"
    volumes:
      # Shadow the SSL conf with the HTTP-only RunPod variant
      - ./nginx/conf.d/default.runpod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      fastify-proxy:
        condition: service_started
      vllm:
        condition: service_healthy

  # ── fastify-proxy (point at vllm service, use /workspace data dir) ────────
  fastify-proxy:
    environment:
      - VLLM_HOST=vllm
      - VLLM_PORT=8000
      - VLLM_PROXY_SQLITE_PATH=/data/vllm-proxy.db
    volumes:
      - ${VLLM_PROXY_SQLITE_HOST_DIR:-./fastify-proxy/data}:/data
    depends_on:
      vllm:
        condition: service_healthy
