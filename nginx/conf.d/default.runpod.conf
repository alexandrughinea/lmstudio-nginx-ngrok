server {
    # HTTP-only — TLS is terminated by RunPod's load balancer before reaching
    # this container. All client↔RunPod traffic is HTTPS; only the internal
    # RunPod-LB→container hop is plaintext, which is within their private network.
    # Do NOT expose port 8080 directly to the internet without a TLS layer.
    listen 8080;
    server_name _;

    # Basic settings
    client_max_body_size 10M;

    # Restore real client IP from RunPod's load balancer X-Forwarded-For header.
    # Without this, $remote_addr is the LB's internal IP and rate limiting
    # would apply the same bucket to every client.
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;

    # Global authentication
    auth_basic "API Access";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # vLLM OpenAI-compatible endpoints via Fastify proxy
    location /v1/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 120s;
        proxy_send_timeout 900s;
        proxy_read_timeout 900s;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
    }

    # Health check (no auth)
    location /health {
        auth_basic off;
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
    }

    # All other endpoints
    location / {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 120s;
        proxy_send_timeout 900s;
        proxy_read_timeout 900s;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
    }
}
