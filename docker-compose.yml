services:
  nginx:
    image: nginx:alpine
    container_name: vllm-nginx
    ports:
      - "${NGINX_SSL_PORT:-8443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
      - ./certs:/etc/nginx/certs:ro
      - ./logs:/var/log/nginx
    depends_on:
      - fastify-proxy
    networks:
      - vllm-network
    restart: unless-stopped

  fastify-proxy:
    build: ./fastify-proxy
    container_name: vllm-fastify-proxy
    environment:
      - PROXY_PORT=3000
      - VLLM_HOST=host.docker.internal
      - VLLM_PORT=${VLLM_PORT:-8000}
      - VLLM_PROXY_SQLITE_PATH=/data/vllm-proxy.db
      - VLLM_PROXY_SQLITE_CACHE=${VLLM_PROXY_SQLITE_CACHE:-true}
      - VLLM_SQLITE_ENCRYPTION_KEY=${VLLM_SQLITE_ENCRYPTION_KEY}
      - VLLM_PROXY_RESPONSE_SIGNING_SECRET=${VLLM_PROXY_RESPONSE_SIGNING_SECRET}
      - VLLM_PROXY_REQUEST_SIGNING_SECRET=${VLLM_PROXY_REQUEST_SIGNING_SECRET}
      - VLLM_PROXY_WEBHOOK_ON_CHAT_COMPLETE=${VLLM_PROXY_WEBHOOK_ON_CHAT_COMPLETE:-}
      - VLLM_PROXY_WEBHOOK_ON_CHAT_COMPLETE_HEADERS=${VLLM_PROXY_WEBHOOK_ON_CHAT_COMPLETE_HEADERS:-}
      - VLLM_PROXY_REQUEST_TIMEOUT=${VLLM_PROXY_REQUEST_TIMEOUT:-900000}
      - VLLM_PROXY_WEBHOOK_TIMEOUT=${VLLM_PROXY_WEBHOOK_TIMEOUT:-30000}
    volumes:
      # Host directory where the SQLite DB is stored; override with VLLM_PROXY_SQLITE_HOST_DIR in .env if desired.
      # Example in .env (host): VLLM_PROXY_SQLITE_HOST_DIR=./fastify-proxy/data
      - ${VLLM_PROXY_SQLITE_HOST_DIR:-./fastify-proxy/data}:/data
    networks:
      - vllm-network
    restart: unless-stopped

networks:
  vllm-network:
    driver: bridge

volumes:
  fastify-proxy-data:
